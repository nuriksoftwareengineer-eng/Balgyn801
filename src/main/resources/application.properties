spring.application.name=Balgyn801

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/balgynbol-spring}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}

spring.jpa.hibernate.ddl-auto=validate

# Flyway — owns schema from here on. V1 baselines existing DBs without re-running DDL.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
# Вывод SQL в логи. По умолчанию выключен, чтобы консоль не засирало.
# Включай при отладке запросов: SPRING_JPA_SHOW_SQL=true (и при желании HIBERNATE_LOG_LEVEL=DEBUG).
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_SHOW_SQL:false}
logging.level.org.hibernate.SQL=${HIBERNATE_LOG_LEVEL:WARN}
logging.level.org.hibernate.orm.jdbc.bind=${HIBERNATE_LOG_LEVEL:WARN}

# JWT (HS256). Секрет ОБЯЗАТЕЛЕН и задаётся ТОЛЬКО через переменную окружения JWT_SECRET (минимум 32 байта UTF-8).
# Дефолта намеренно НЕТ: при пустом секрете приложение не стартует (см. JwtService) — это исключает
# использование известного секрета из исходников в продакшене. Для локального запуска экспортируйте JWT_SECRET.
jwt.secret=${JWT_SECRET:}
# Access: короткий срок (по умолчанию 15 мин). Refresh продлевает сессию без пароля.
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:1209600000}

# Первый вход администратора при пустой таблице users. Креды задаются ТОЛЬКО через env.
# Дефолтов НЕТ: без BOOTSTRAP_ADMIN_EMAIL и BOOTSTRAP_ADMIN_PASSWORD автосоздание admin не выполняется
# (см. BootstrapAdminInitializer) — убран известный аккаунт admin@balgyn.local/ChangeMe_Admin123.
# Дальше роли ADMIN раздаются через защищённый POST /api/v1/auth/admin/grant.
app.security.bootstrap-admin-email=${BOOTSTRAP_ADMIN_EMAIL:}
app.security.bootstrap-admin-password=${BOOTSTRAP_ADMIN_PASSWORD:}

# CORS: список origin'ов через запятую. На проде укажите только боевые origin'ы (ALLOWED_ORIGINS=https://shop.example.com).
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:5175}

# Swagger UI и OpenAPI. В продакшене ВЫКЛЮЧЕНЫ принудительно профилем prod (application-prod.properties),
# независимо от SWAGGER_ENABLED. При false /swagger-ui/** и /v3/api-docs/** возвращают 403 и springdoc отключается.
# Запуск прода: SPRING_PROFILES_ACTIVE=prod.
app.swagger.enabled=${SWAGGER_ENABLED:true}
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}

# MinIO / S3-совместимое хранилище для картинок товаров (AWS SDK v2, path-style).
# Локально без Docker: поднимите MinIO на 9000 или выставьте STORAGE_ENABLED=false.
app.storage.enabled=${STORAGE_ENABLED:false}
app.storage.endpoint=${MINIO_ENDPOINT:http://127.0.0.1:9000}
app.storage.public-base-url=${MINIO_PUBLIC_URL:http://localhost:9000}
app.storage.access-key=${MINIO_ROOT_USER:minioadmin}
app.storage.secret-key=${MINIO_ROOT_PASSWORD:minioadmin}
app.storage.bucket=${MINIO_BUCKET:balgyn-media}
app.storage.region=${MINIO_REGION:us-east-1}

spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=9MB

# СДЭК API v2. Пустые ключи = заглушка (фронт работает с мок-данными).
# Sandbox: https://api.edu.cdek.ru/v2, production: https://api.cdek.ru/v2.
# cdek.sender-city — код города отправителя из справочника СДЭК (270 = Алматы).
cdek.base-url=${CDEK_BASE_URL:https://api.edu.cdek.ru/v2}
cdek.client-id=${CDEK_CLIENT_ID:}
cdek.client-secret=${CDEK_CLIENT_SECRET:}
cdek.sender-city=${CDEK_SENDER_CITY:270}
cdek.default-tariff=${CDEK_DEFAULT_TARIFF:136}
# Shared token CDEK sends in X-Authorization header for webhook events.
# Empty = accept without verification (dev/mock mode only). MUST be set in production.
cdek.webhook-token=${CDEK_WEBHOOK_TOKEN:}
# Режим провайдера доставки: auto|mock|real. auto (по умолчанию) = real при заданных ключах,
# иначе mock. После получения ключей переключение — только сменой ENV, без правок кода.
cdek.provider=${CDEK_PROVIDER:auto}

# ── Orders / delivery / exchange rate ──────────────────────────────────────────
# Unpaid (PENDING_PAYMENT) orders expire after this window; the scheduled job then releases
# their reserved inventory and marks them EXPIRED.
app.orders.payment-window-minutes=${ORDER_PAYMENT_WINDOW_MINUTES:60}

# Cold-start fallbacks. The DB (delivery_settings / exchange_rates) is authoritative; these only
# apply if a row is missing (e.g. a fresh DB). Checkout never calls an external rate API.
app.delivery.kz-flat-kzt-bootstrap=${KZ_DELIVERY_FLAT_KZT:1600}
app.exchange-rate.kzt-per-usd-bootstrap=${KZT_PER_USD_BOOTSTRAP:480.0000}
# Flat USD markup added to international shipping (used in the international pricing phase).
app.exchange-rate.markup-usd=${INTERNATIONAL_MARKUP_USD:5}
# Daily best-effort refresh of the cached rate from the National Bank of Kazakhstan feed.
app.exchange-rate.refresh-cron=${EXCHANGE_RATE_REFRESH_CRON:0 0 * * * *}
app.exchange-rate.nbk-rss-url=${NBK_RSS_URL:https://nationalbank.kz/rss/rates_all.xml}
app.exchange-rate.fetch-timeout-ms=${EXCHANGE_RATE_FETCH_TIMEOUT_MS:3000}

# ── Frontend base URL ────────────────────────────────────────────────────────────
# Used to build payment redirect URLs. In Docker set FRONTEND_BASE_URL=http://localhost:5174.
# In production set it to the real domain, e.g. https://balgyn.kz.
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173}

# ── Payment: Freedom Pay ────────────────────────────────────────────────────────
# Merchant ID и секретный ключ из личного кабинета Freedom Pay.
# Пустой FREEDOMPAY_MERCHANT_ID = заглушка (stub): реальных API-вызовов нет, URL фиктивный.
app.payment.freedompay.merchant-id=${FREEDOMPAY_MERCHANT_ID:}
app.payment.freedompay.secret-key=${FREEDOMPAY_SECRET_KEY:}
app.payment.freedompay.api-url=${FREEDOMPAY_API_URL:https://api.freedompay.kz}
# URL, на который Freedom Pay отправит результат оплаты (должен быть публично доступен).
app.payment.freedompay.result-url=${FREEDOMPAY_RESULT_URL:}
# URL для редиректа пользователя после успешной/неудачной оплаты.
# Defaults use app.frontend.base-url so the redirect always lands on the running frontend.
app.payment.freedompay.success-url=${FREEDOMPAY_SUCCESS_URL:${app.frontend.base-url}/payment/success}
app.payment.freedompay.failure-url=${FREEDOMPAY_FAILURE_URL:${app.frontend.base-url}/payment/failed}
# Последний сегмент result-url (используется в MD5-подписи). Должен совпадать с именем скрипта в result-url.
app.payment.freedompay.callback-script-name=${FREEDOMPAY_CALLBACK_SCRIPT_NAME:freedom-pay}
# true = режим тестирования (pg_testing_mode=1). Только для sandbox.
app.payment.freedompay.testing-mode=${FREEDOMPAY_TESTING_MODE:false}

# ── Payment: PayPal ─────────────────────────────────────────────────────────────
# "sandbox" или "live". Определяет base URL PayPal API.
app.payment.paypal.mode=${PAYPAL_MODE:sandbox}
# OAuth2 client ID из PayPal Developer Dashboard.
app.payment.paypal.client-id=${PAYPAL_CLIENT_ID:}
# OAuth2 client secret из PayPal Developer Dashboard.
app.payment.paypal.client-secret=${PAYPAL_CLIENT_SECRET:}
# Webhook ID из PayPal Developer Dashboard (требуется для верификации подписи webhook).
app.payment.paypal.webhook-id=${PAYPAL_WEBHOOK_ID:}

# Stub payment base URL — browser-accessible URL of this backend.
# Used to build local redirect URLs when payment credentials are blank (dev/CI mode only).
app.payment.stub.base-url=${PAYMENT_STUB_BASE_URL:http://localhost:8080}

# ── Payment rate limiting ────────────────────────────────────────────────────────
# Rate limiting: max requests per minute per remote IP.
app.payment.webhook.init-rate-limit-per-minute=${PAYMENT_INIT_RATE_LIMIT:10}
app.payment.webhook.webhook-rate-limit-per-minute=${PAYMENT_WEBHOOK_RATE_LIMIT:100}

# ── Sensitive endpoint rate limiting (per remote IP, скользящее окно 60s) ────────
# Анти-brute-force для входа/регистрации и анти-спам для публичной отправки кастом-дизайна.
app.security.rate-limit.auth-per-minute=${AUTH_RATE_LIMIT:10}
app.security.rate-limit.custom-design-per-minute=${CUSTOM_DESIGN_RATE_LIMIT:5}
app.security.rate-limit.order-per-minute=${ORDER_RATE_LIMIT:15}
app.security.rate-limit.upload-per-minute=${UPLOAD_RATE_LIMIT:5}
# false = игнорировать X-Forwarded-For (без прокси; клиент не может подделать IP).
# true  = доверять XFF и брать самый правый IP (за nginx/Cloudflare).
app.security.rate-limit.trust-proxy=${TRUST_PROXY:false}
# Выставить Secure-флаг на refresh-cookie (требует HTTPS). true на проде, false локально.
app.security.cookie-secure=${COOKIE_SECURE:false}

# Seed catalog data (groups, collections, 2 sample designs, colors, sizes, inventory).
# Set APP_SEED_CATALOG=true to seed on first startup. Safe to run multiple times — skips if data exists.
app.seed.catalog=${APP_SEED_CATALOG:false}

# ── Spring Actuator ──────────────────────────────────────────────────────────────
# Only /actuator/health is exposed — no sensitive data, no shutdown endpoint.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.server.port=8080