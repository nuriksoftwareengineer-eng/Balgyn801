spring.application.name=Balgyn801

spring.datasource.url=jdbc:postgresql://localhost:5432/balgynbol-spring
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
# Вывод SQL в логи. По умолчанию выключен, чтобы консоль не засирало.
# Включай при отладке запросов: SPRING_JPA_SHOW_SQL=true (и при желании HIBERNATE_LOG_LEVEL=DEBUG).
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_SHOW_SQL:false}
logging.level.org.hibernate.SQL=${HIBERNATE_LOG_LEVEL:WARN}
logging.level.org.hibernate.orm.jdbc.bind=${HIBERNATE_LOG_LEVEL:WARN}

# JWT (HS256). Для продакшена задайте длинный секрет через переменную окружения JWT_SECRET (минимум 32 байта в UTF-8).
# Приложение откажется стартовать, если секрет короче 32 байт.
jwt.secret=${JWT_SECRET:balgyn801-dev-secret-change-me-use-env-JWT_SECRET-min-32chars!!}
# Access: короткий срок (по умолчанию 15 мин). Refresh продлевает сессию без пароля.
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:1209600000}

# Первый вход администратора при пустой таблице users (в продакшене задайте BOOTSTRAP_ADMIN_PASSWORD через env).
# Дальше роли ADMIN раздаются через защищённый POST /api/v1/auth/admin/grant.
app.security.bootstrap-admin-email=${BOOTSTRAP_ADMIN_EMAIL:admin@balgyn.local}
app.security.bootstrap-admin-password=${BOOTSTRAP_ADMIN_PASSWORD:ChangeMe_Admin123}

# CORS: список origin'ов через запятую. На проде укажите только боевые origin'ы (ALLOWED_ORIGINS=https://shop.example.com).
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:5175}

# Swagger UI и OpenAPI: на проде рекомендуется отключить (SWAGGER_ENABLED=false).
# При false /swagger-ui/** и /v3/api-docs/** возвращают 403 и springdoc отключается.
app.swagger.enabled=${SWAGGER_ENABLED:true}
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}

# MinIO / S3-совместимое хранилище для картинок товаров (AWS SDK v2, path-style).
# Локально без Docker: поднимите MinIO на 9000 или выставьте STORAGE_ENABLED=false.
app.storage.enabled=${STORAGE_ENABLED:true}
app.storage.endpoint=${MINIO_ENDPOINT:http://127.0.0.1:9000}
app.storage.public-base-url=${MINIO_PUBLIC_URL:http://localhost:9000}
app.storage.access-key=${MINIO_ROOT_USER:minioadmin}
app.storage.secret-key=${MINIO_ROOT_PASSWORD:minioadmin}
app.storage.bucket=${MINIO_BUCKET:balgyn-media}
app.storage.region=${MINIO_REGION:us-east-1}

spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=9MB

# СДЭК API v2. Пустые ключи = заглушка (фронт работает с мок-данными).
# Sandbox: https://api.edu.cdek.ru/v2, production: https://api.cdek.ru/v2.
# cdek.sender-city — код города отправителя из справочника СДЭК (270 = Алматы).
cdek.base-url=${CDEK_BASE_URL:https://api.edu.cdek.ru/v2}
cdek.client-id=${CDEK_CLIENT_ID:}
cdek.client-secret=${CDEK_CLIENT_SECRET:}
cdek.sender-city=${CDEK_SENDER_CITY:270}
cdek.default-tariff=${CDEK_DEFAULT_TARIFF:136}