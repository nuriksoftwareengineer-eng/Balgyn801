# Production-профиль. Запуск: SPRING_PROFILES_ACTIVE=prod
#
# Жёстко выключает Swagger/OpenAPI независимо от env SWAGGER_ENABLED — защита от случайного
# раскрытия карты API в продакшене. При false /swagger-ui/** и /v3/api-docs/** возвращают 403.
app.swagger.enabled=false
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Webhook без подписи в проде запрещён (дубль безопасного дефолта на случай переопределения env).
app.payment.webhook.allow-unsigned=false

# Безопасные куки (требует HTTPS). В проде обязательно true.
app.security.cookie-secure=true

# Доверять X-Forwarded-For (за nginx/Cloudflare/любым reverse proxy).
app.security.rate-limit.trust-proxy=true
