spring.datasource.url=jdbc:h2:mem:balgyntest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.jpa.show-sql=false
# Disable Open-Session-In-View in tests: each transaction gets its own session, preventing a
# MockMvc request's session from leaking managed entities into the next test's cleanup.
spring.jpa.open-in-view=false

# Keep the scheduled jobs from firing mid-test (expiry is invoked directly where tested).
app.orders.expiry-initial-delay-ms=3600000
app.orders.expiry-scan-ms=3600000

jwt.secret=test-secret-key-at-least-32-bytes-long-for-jwt!!
jwt.expiration-ms=3600000
jwt.refresh-expiration-ms=7200000
app.security.bootstrap-admin-email=
app.security.bootstrap-admin-password=

app.cors.allowed-origins=http://localhost:5173
app.swagger.enabled=true

app.storage.enabled=false

# Payment webhook: empty secrets = bypass HMAC check in all existing tests.
# Override with @TestPropertySource in security-specific tests.
app.payment.webhook.secrets.KASPI=
app.payment.webhook.secrets.YOOKASSA=
app.payment.webhook.secrets.PAYPAL=
# High limits so tests never hit rate limiting unless testing rate limits explicitly.
app.payment.webhook.init-rate-limit-per-minute=10000
app.payment.webhook.webhook-rate-limit-per-minute=10000

cdek.base-url=https://api.edu.cdek.ru/v2
cdek.client-id=
cdek.client-secret=
cdek.sender-city=270
cdek.default-tariff=136
