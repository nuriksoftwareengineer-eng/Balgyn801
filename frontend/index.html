    <style>
      /* Instant paint shell — visible from HTML parse, before the JS bundle loads.
         Removed automatically when React mounts (createRoot clears #root on first render).
         Inline <style> is allowed by the production CSP (style-src 'unsafe-inline').
         Black to match the brand's original splash identity — html/body background is
         set here too so there's no gap where the browser's own white default could show
         through before this block (or the real stylesheet) takes effect. */
      html, body {
        background: #000000;
      }
      #app-skeleton {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: #000000;
        font-family: "Montserrat", -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, Helvetica, Arial, sans-serif;
      }
      #app-skeleton .sk-word {
        font-size: clamp(2rem, 8vw, 3.5rem);
        font-weight: 700;
        letter-spacing: -0.04em;
        text-transform: uppercase;
        color: #ffffff;
      }
      #app-skeleton .sk-track {
        width: 120px;
        height: 2px;
        background: rgba(255, 255, 255, 0.2);
        overflow: hidden;
      }
      /* One-shot grow, not an infinite loop: the app now often mounts in well under a
         second, so a looping animation gets torn out of the DOM mid-cycle and reads as a
         glitch/flash. A single grow-then-hold always looks intentional, whether it's cut
         off after 50ms (still growing — reads as "starting up") or fully settled. */
      #app-skeleton .sk-bar {
        height: 100%;
        width: 100%;
        background: #ffffff;
        transform: scaleX(0);
        transform-origin: left;
        animation: sk-grow 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes sk-grow {
        to { transform: scaleX(1); }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-skeleton .sk-bar { animation: none; transform: scaleX(1); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-skeleton" aria-hidden="true">
        <div class="sk-word">Balgyn</div>
        <div class="sk-track"><div class="sk-bar"></div></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
