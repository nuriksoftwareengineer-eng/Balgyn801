<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" width="560" height="400" font-family="Arial, sans-serif">
  <rect width="560" height="400" fill="#ffffff"/>

  <!-- Title -->
  <text x="280" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#111" letter-spacing="2">РАЗМЕРНАЯ СЕТКА — ХУДИ</text>
  <line x1="40" y1="46" x2="520" y2="46" stroke="#111" stroke-width="1.5"/>

  <!-- Header row -->
  <rect x="40" y="56" width="480" height="36" fill="#111"/>
  <text x="100" y="79" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">РАЗМЕР</text>
  <text x="210" y="79" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">ГРУДЬ (см)</text>
  <text x="330" y="79" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">ДЛИНА (см)</text>
  <text x="450" y="79" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">РУКАВ (см)</text>

  <!-- Row S -->
  <rect x="40" y="92" width="480" height="38" fill="#f9f9f9"/>
  <text x="100" y="116" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">S</text>
  <text x="210" y="116" text-anchor="middle" font-size="14" fill="#333">96–100</text>
  <text x="330" y="116" text-anchor="middle" font-size="14" fill="#333">65</text>
  <text x="450" y="116" text-anchor="middle" font-size="14" fill="#333">60</text>

  <!-- Row M -->
  <rect x="40" y="130" width="480" height="38" fill="#fff"/>
  <text x="100" y="154" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">M</text>
  <text x="210" y="154" text-anchor="middle" font-size="14" fill="#333">100–104</text>
  <text x="330" y="154" text-anchor="middle" font-size="14" fill="#333">67</text>
  <text x="450" y="154" text-anchor="middle" font-size="14" fill="#333">62</text>

  <!-- Row L -->
  <rect x="40" y="168" width="480" height="38" fill="#f9f9f9"/>
  <text x="100" y="192" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">L</text>
  <text x="210" y="192" text-anchor="middle" font-size="14" fill="#333">104–108</text>
  <text x="330" y="192" text-anchor="middle" font-size="14" fill="#333">69</text>
  <text x="450" y="192" text-anchor="middle" font-size="14" fill="#333">64</text>

  <!-- Row XL -->
  <rect x="40" y="206" width="480" height="38" fill="#fff"/>
  <text x="100" y="230" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">XL</text>
  <text x="210" y="230" text-anchor="middle" font-size="14" fill="#333">108–112</text>
  <text x="330" y="230" text-anchor="middle" font-size="14" fill="#333">71</text>
  <text x="450" y="230" text-anchor="middle" font-size="14" fill="#333">66</text>

  <!-- Row XXL -->
  <rect x="40" y="244" width="480" height="38" fill="#f9f9f9"/>
  <text x="100" y="268" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">XXL</text>
  <text x="210" y="268" text-anchor="middle" font-size="14" fill="#333">112–116</text>
  <text x="330" y="268" text-anchor="middle" font-size="14" fill="#333">73</text>
  <text x="450" y="268" text-anchor="middle" font-size="14" fill="#333">68</text>

  <!-- Bottom border -->
  <line x1="40" y1="282" x2="520" y2="282" stroke="#111" stroke-width="1.5"/>

  <!-- Vertical lines -->
  <line x1="160" y1="56" x2="160" y2="282" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="270" y1="56" x2="270" y2="282" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="390" y1="56" x2="390" y2="282" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Note -->
  <text x="280" y="320" text-anchor="middle" font-size="11" fill="#888">Все размеры указаны в сантиметрах. Модель оверсайз — берите свой размер.</text>
  <text x="280" y="340" text-anchor="middle" font-size="11" fill="#888">Погрешность измерения ±1–2 см.</text>

  <!-- Balgyn watermark -->
  <text x="280" y="380" text-anchor="middle" font-size="10" fill="#ccc" letter-spacing="4">BALGYN</text>
</svg>
