server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Baseline security headers (safe in dev). Full CSP/HSTS live in Caddy (caddy/Caddyfile)
    # in front of this container in production — a strict CSP here would break dev MinIO
    # images (http://localhost:9000) and the optional direct :8080 API mode, so it is
    # intentionally scoped to prod only.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy API calls to the backend container (same-origin → no CORS needed).
    # The frontend is built with VITE_API_BASE_URL=/api/v1 (relative) by default, so /api/*
    # MUST be forwarded to the `app` service. Without this block a fresh `docker compose up`
    # (no .env override) serves index.html for every /api call and the whole UI is dead.
    location /api/ {
        proxy_pass http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback — all unknown paths serve index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Immutable static assets (hashed filenames from Vite build)
    location ~* \.(js|css|woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Images with moderate cache
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Don't cache HTML (always re-check for new deploys)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;
}
