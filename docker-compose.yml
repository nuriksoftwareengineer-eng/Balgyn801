services:
  app:
    image: dev-balgynbol-spring
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/balgynbol-spring
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      # CDEK (optional): set real credentials in env/.env for non-stub mode.
      - CDEK_BASE_URL=${CDEK_BASE_URL:-https://api.edu.cdek.ru/v2}
      - CDEK_CLIENT_ID=${CDEK_CLIENT_ID:-}
      - CDEK_CLIENT_SECRET=${CDEK_CLIENT_SECRET:-}
      - CDEK_SENDER_CITY=${CDEK_SENDER_CITY:-270}
      - CDEK_DEFAULT_TARIFF=${CDEK_DEFAULT_TARIFF:-136}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_PUBLIC_URL=http://localhost:9000
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - MINIO_BUCKET=balgyn-media
    depends_on:
      - db
      - minio

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    # npm ci matches package-lock; anonymous node_modules volumes could miss new deps (e.g. framer-motion).
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5174:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080/api/v1
    volumes:
      - .:/app
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      - app

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: balgynbol-spring
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - .:/app

volumes:
  minio_data:
  frontend_node_modules: