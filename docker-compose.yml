services:
  app:
    image: dev-balgynbol-spring
    build: .
    ports:
      - "8080:8080"
    environment:
      # JWT secret. Defaults to a dev-only value — MUST be changed for production.
      # Generate a strong secret: openssl rand -hex 32
      - JWT_SECRET=${JWT_SECRET:-balgyn-dev-jwt-secret-for-local-development-only-change-in-prod}
      # Bootstrap admin (created on empty users table). Defaults are dev-only — change for production.
      - BOOTSTRAP_ADMIN_EMAIL=${BOOTSTRAP_ADMIN_EMAIL:-admin@balgyn.local}
      - BOOTSTRAP_ADMIN_PASSWORD=${BOOTSTRAP_ADMIN_PASSWORD:-admin12345}
      # Локальный stub оплаты: разрешить неподписанные webhooks (в проде false + реальные секреты).
      - PAYMENT_WEBHOOK_ALLOW_UNSIGNED=${PAYMENT_WEBHOOK_ALLOW_UNSIGNED:-false}
      - SWAGGER_ENABLED=${SWAGGER_ENABLED:-true}
      # Профиль Spring. Выставь prod чтобы выключить Swagger и включить COOKIE_SECURE/TRUST_PROXY.
      # - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/balgynbol-spring
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      # CDEK — production account credentials baked in. Zero-config: real cities and PVZ work out of the box.
      # Requires prod API URL (edu sandbox rejects these keys with 401).
      - CDEK_BASE_URL=${CDEK_BASE_URL:-https://api.cdek.ru/v2}
      - CDEK_CLIENT_ID=${CDEK_CLIENT_ID:-q06wCcLfs7sMvj2OIPmIB8d8UckXFLD8}
      - CDEK_CLIENT_SECRET=${CDEK_CLIENT_SECRET:-A2oK3jwmP4sgvXzI2JMssmAbLIpXs7mY}
      - CDEK_SENDER_CITY=${CDEK_SENDER_CITY:-270}
      - CDEK_DEFAULT_TARIFF=${CDEK_DEFAULT_TARIFF:-136}
      # Режим провайдера доставки: auto|mock|real. auto = real при заданных ключах, иначе mock.
      - CDEK_PROVIDER=${CDEK_PROVIDER:-auto}
      # Seed catalog on first startup (skipped if catalog already populated).
      - APP_SEED_CATALOG=${APP_SEED_CATALOG:-true}
      # Frontend base URL — used to build Freedom Pay success/failure redirect URLs.
      # Change to https://yourdomain.com in production.
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-http://localhost:5174}
      # Freedom Pay — blank by default → stub mode (auto-confirms orders locally).
      # For real FreedomPay testing: set FREEDOMPAY_RESULT_URL to your ngrok/public URL.
      - FREEDOMPAY_MERCHANT_ID=${FREEDOMPAY_MERCHANT_ID:-}
      - FREEDOMPAY_SECRET_KEY=${FREEDOMPAY_SECRET_KEY:-}
      - FREEDOMPAY_RESULT_URL=${FREEDOMPAY_RESULT_URL:-}
      - FREEDOMPAY_SUCCESS_URL=${FREEDOMPAY_SUCCESS_URL:-http://localhost:5174/payment-return}
      - FREEDOMPAY_FAILURE_URL=${FREEDOMPAY_FAILURE_URL:-http://localhost:5174/payment/failed}
      - FREEDOMPAY_TESTING_MODE=${FREEDOMPAY_TESTING_MODE:-false}
      # VTB Kazakhstan — blank by default → stub mode (auto-confirms orders locally).
      # For real VTB testing: set VTB_USERNAME, VTB_PASSWORD, VTB_CALLBACK_URL, VTB_SANDBOX=false.
      - VTB_USERNAME=${VTB_USERNAME:-}
      - VTB_PASSWORD=${VTB_PASSWORD:-}
      - VTB_SANDBOX=${VTB_SANDBOX:-true}
      - VTB_CALLBACK_URL=${VTB_CALLBACK_URL:-}
      - VTB_HMAC_SECRET=${VTB_HMAC_SECRET:-}
      # PayPal Sandbox — real sandbox credentials baked in, works locally without .env.
      - PAYPAL_MODE=${PAYPAL_MODE:-sandbox}
      - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID:-AXymWxzrWktAxw9fkuZqBjOEW8MQCKrEWYOOfEQ1bPBKHSfWkH-hfFpeYlYgabr9zIpVT_8N8LWnKtpH}
      - PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET:-EFPZr6A1Vg2nbFTyr2SuQlxUg0yA4Yj9I-jew4tEa4dkqSQA8fu7AfNZW3-HYmcz-xD5IczuFRTUPBA6}
      - PAYPAL_WEBHOOK_ID=${PAYPAL_WEBHOOK_ID:-7AS768482S5495201a}
      # Email — disabled by default. Set MAIL_ENABLED=true + SMTP creds to send real emails.
      - MAIL_ENABLED=${MAIL_ENABLED:-false}
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_FROM=${MAIL_FROM:-noreply@balgyn.kz}
      # Telegram admin alerts — disabled by default. Set TELEGRAM_ENABLED=true + bot token + chat id.
      - TELEGRAM_ENABLED=${TELEGRAM_ENABLED:-false}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - STORAGE_ENABLED=true
      - MINIO_ENDPOINT=http://minio:9000
      # MINIO_PUBLIC_URL — URL, под которым браузер обращается к MinIO.
      # Локально: localhost:9000 (порт проброшен в docker-compose). На проде замените на реальный домен.
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL:-http://localhost:9000}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-balgyn-media}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v1/exchange-rates > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Relative path: nginx proxy (or browser) will route /api/v1 → backend.
        # Override with the full URL (https://api.yourdomain.com/api/v1) if not using nginx proxy.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    ports:
      - "5174:80"
    depends_on:
      app:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: balgynbol-spring
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d balgynbol-spring"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  minio_data:
  postgres_data:
